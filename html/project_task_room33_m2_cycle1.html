
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.root { font-family: var(--font-sans); }
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 10px;
  border-bottom: 0.5px solid var(--color-border-tertiary);
}
.topbar-left { display: flex; flex-direction: column; gap: 3px; }
.breadcrumb { font-size: 11px; color: var(--color-text-tertiary); display: flex; align-items: center; gap: 5px; }
.breadcrumb i { font-size: 11px; }
.project-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); display: flex; align-items: center; gap: 8px; }
.topbar-right { display: flex; gap: 8px; align-items: center; }
.pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.pill-blue { background: #E6F1FB; color: #0C447C; }
.pill-green { background: #EAF3DE; color: #27500A; }
.pill-amber { background: #FAEEDA; color: #633806; }
.pill-gray { background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-secondary); }
.btn-sm { font-size: 12px; padding: 6px 13px; border-radius: var(--border-radius-md); cursor: pointer; display: flex; align-items: center; gap: 5px; }
.btn-primary { background: #E6F1FB; color: #0C447C; border: none; font-weight: 500; }
.btn-ghost { background: transparent; color: var(--color-text-secondary); border: 0.5px solid var(--color-border-secondary); }

.meta-strip {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  border-bottom: 0.5px solid var(--color-border-tertiary);
}
.meta-item {
  padding: 9px 18px;
  border-right: 0.5px solid var(--color-border-tertiary);
  display: flex; flex-direction: column; gap: 2px;
}
.meta-item:last-child { border-right: none; }
.meta-label { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; }
.meta-val { font-size: 13px; font-weight: 500; color: var(--color-text-primary); display: flex; align-items: center; gap: 5px; }
.meta-val i { font-size: 13px; color: var(--color-text-secondary); }

.progress-section { padding: 10px 18px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 12px; }
.progress-label { font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; }
.progress-track { flex: 1; height: 6px; background: var(--color-background-secondary); border-radius: 3px; border: 0.5px solid var(--color-border-tertiary); }
.progress-fill { height: 100%; border-radius: 3px; background: #27c56a; transition: width 0.3s; }
.progress-pct { font-size: 12px; font-weight: 500; color: var(--color-text-primary); min-width: 32px; text-align: right; }

.view-toggle { display: flex; gap: 0; border-bottom: 0.5px solid var(--color-border-tertiary); padding: 0 18px; }
.view-tab {
  font-size: 12px; padding: 8px 14px; cursor: pointer;
  color: var(--color-text-secondary); border-bottom: 2px solid transparent;
  display: flex; align-items: center; gap: 5px;
  transition: color 0.1s;
}
.view-tab i { font-size: 13px; }
.view-tab.active { color: #185FA5; border-bottom-color: #378ADD; }

.kanban { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; padding: 14px 18px; align-items: start; }
.col-header { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--color-text-tertiary); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.col-count { font-size: 11px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 10px; padding: 1px 7px; color: var(--color-text-secondary); font-weight: 400; }
.task-card {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 10px 11px;
  margin-bottom: 7px;
  cursor: pointer;
  transition: border-color 0.12s;
}
.task-card:hover { border-color: var(--color-border-secondary); }
.task-card.selected { border: 1.5px solid #378ADD; }
.tc-job { font-size: 12px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; display: flex; align-items: flex-start; gap: 6px; }
.tc-job i { font-size: 13px; color: var(--color-text-secondary); flex-shrink: 0; margin-top: 1px; }
.tc-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.tc-assign { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }
.tc-date { font-size: 10px; color: var(--color-text-tertiary); display: flex; align-items: center; gap: 3px; }
.tc-date i { font-size: 11px; }
.tc-prio { font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 500; }
.prio-normal { background: #E6F1FB; color: #185FA5; }
.prio-high { background: #FAEEDA; color: #854F0B; }
.prio-urgent { background: #FCEBEB; color: #A32D2D; }
.prio-low { background: var(--color-background-secondary); color: var(--color-text-secondary); }
.add-task-btn {
  width: 100%; font-size: 12px; padding: 6px 10px;
  background: transparent; border: 0.5px dashed var(--color-border-secondary);
  border-radius: var(--border-radius-md); cursor: pointer;
  color: var(--color-text-tertiary); display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: background 0.1s, color 0.1s;
}
.add-task-btn:hover { background: var(--color-background-secondary); color: var(--color-text-secondary); }

.detail-panel {
  border-top: 0.5px solid var(--color-border-tertiary);
  padding: 14px 18px;
  display: none;
}
.detail-panel.show { display: block; }
.dp-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.dp-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); display: flex; align-items: center; gap: 7px; }
.dp-title i { font-size: 15px; color: var(--color-text-secondary); }
.dp-close { font-size: 13px; padding: 4px 8px; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; color: var(--color-text-secondary); }
.dp-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.dp-field { display: flex; flex-direction: column; gap: 3px; }
.dp-field label { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; }
.dp-field span { font-size: 13px; color: var(--color-text-primary); }
.dp-notes { margin-top: 10px; font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 9px 12px; line-height: 1.6; }
.col-todo .task-card { border-left: 2px solid #B4B2A9; border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; }
.col-inprog .task-card { border-left: 2px solid #378ADD; border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; }
.col-review .task-card { border-left: 2px solid #EF9F27; border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; }
.col-done .task-card { border-left: 2px solid #27c56a; border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; opacity: 0.75; }
</style>

<h2 class="sr-only">Project & Task — Room 33, Plant M2, Cycle 1</h2>

<div class="root">
  <div class="topbar">
    <div class="topbar-left">
      <div class="breadcrumb">
        <i class="ti ti-building-factory-2" aria-hidden="true"></i>
        Plant M2
        <i class="ti ti-chevron-right" aria-hidden="true"></i>
        Room 33
        <i class="ti ti-chevron-right" aria-hidden="true"></i>
        M2-Cycle-1
      </div>
      <div class="project-title">
        <i class="ti ti-layout-kanban" aria-hidden="true"></i>
        M2-Cycle-1 · Room 33
        <span class="pill pill-green">Active</span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="pill pill-gray"><i class="ti ti-door" style="font-size:11px;vertical-align:-1px;margin-right:3px;" aria-hidden="true"></i>Room 33 · 112 m²</span>
      <button class="btn-sm btn-ghost"><i class="ti ti-dots" style="font-size:13px;" aria-hidden="true"></i></button>
      <button class="btn-sm btn-primary" onclick="sendPrompt('Tạo job mới cho phòng 33 Plant M2 Cycle 1')"><i class="ti ti-plus" style="font-size:13px;" aria-hidden="true"></i>Add task ↗</button>
    </div>
  </div>

  <div class="meta-strip">
    <div class="meta-item">
      <div class="meta-label">Cycle</div>
      <div class="meta-val"><i class="ti ti-refresh" aria-hidden="true"></i>Cycle 1</div>
    </div>
    <div class="meta-item">
      <div class="meta-label">Start date</div>
      <div class="meta-val"><i class="ti ti-calendar" aria-hidden="true"></i>04 Jun 2026</div>
    </div>
    <div class="meta-item">
      <div class="meta-label">Target harvest</div>
      <div class="meta-val"><i class="ti ti-calendar-check" aria-hidden="true"></i>20 Jun 2026</div>
    </div>
    <div class="meta-item">
      <div class="meta-label">Team</div>
      <div class="meta-val"><i class="ti ti-users" aria-hidden="true"></i>Minh T. · Lan N.</div>
    </div>
  </div>

  <div class="progress-section">
    <span class="progress-label">Overall progress</span>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:37%"></div></div>
    <span class="progress-pct" id="prog-pct">3 / 8</span>
  </div>

  <div class="view-toggle">
    <div class="view-tab active"><i class="ti ti-layout-kanban" aria-hidden="true"></i>Kanban</div>
    <div class="view-tab" onclick="sendPrompt('Xem timeline Gantt phòng 33 Plant M2 Cycle 1')"><i class="ti ti-timeline" aria-hidden="true"></i>Timeline ↗</div>
    <div class="view-tab" onclick="sendPrompt('Xem danh sách tất cả jobs phòng 33 Plant M2 Cycle 1')"><i class="ti ti-list" aria-hidden="true"></i>List ↗</div>
  </div>

  <div class="kanban">
    <div>
      <div class="col-header">To do <span class="col-count" id="cnt-todo">2</span></div>
      <div class="col-todo" id="col-todo"></div>
      <button class="add-task-btn" onclick="sendPrompt('Thêm task To Do mới cho phòng 33 Plant M2 Cycle 1')"><i class="ti ti-plus" style="font-size:13px;" aria-hidden="true"></i>Add task ↗</button>
    </div>
    <div>
      <div class="col-header">In progress <span class="col-count" id="cnt-inprog">2</span></div>
      <div class="col-inprog" id="col-inprog"></div>
      <button class="add-task-btn" onclick="sendPrompt('Thêm task In Progress mới cho phòng 33 Plant M2 Cycle 1')"><i class="ti ti-plus" style="font-size:13px;" aria-hidden="true"></i>Add task ↗</button>
    </div>
    <div>
      <div class="col-header">Review <span class="col-count" id="cnt-review">1</span></div>
      <div class="col-review" id="col-review"></div>
      <button class="add-task-btn" onclick="sendPrompt('Thêm task Review mới cho phòng 33 Plant M2 Cycle 1')"><i class="ti ti-plus" style="font-size:13px;" aria-hidden="true"></i>Add task ↗</button>
    </div>
    <div>
      <div class="col-header">Done <span class="col-count" id="cnt-done">3</span></div>
      <div class="col-done" id="col-done"></div>
    </div>
  </div>

  <div class="detail-panel" id="detail-panel"></div>
</div>

<script>
const TASKS = [
  { id:1, job:'Watering', icon:'ti-droplet', status:'todo', assignee:'Minh T.', date:'14 Jun', priority:'normal', notes:'Plan: 2 Side 2L/m² — check moisture level before starting.' },
  { id:2, job:'Set up clean bed', icon:'ti-bed', status:'todo', assignee:'Lan N.', date:'15 Jun', priority:'high', notes:'Prepare clean bed materials in advance. Coordinate with Harvest team.' },
  { id:3, job:'Prochloraz', icon:'ti-flask', status:'inprog', assignee:'Minh T.', date:'13 Jun', priority:'urgent', notes:'Rate: 1.3 g/m² · Area: 112 m² = 145.6 g total. Wear PPE.' },
  { id:4, job:'Pack up tree', icon:'ti-trees', status:'inprog', assignee:'Hùng V.', date:'13 Jun', priority:'normal', notes:'Final substrate and tree pack up before next cycle.' },
  { id:5, job:'Clean room', icon:'ti-sparkles', status:'review', assignee:'Lan N.', date:'12 Jun', priority:'high', notes:'Handover inspection pending. Harvest team sign-off required.' },
  { id:6, job:'Filling', icon:'ti-box', status:'done', assignee:'Minh T.', date:'04 Jun', priority:'normal', notes:'Completed. New room substrate loaded successfully.' },
  { id:7, job:'Airing', icon:'ti-wind', status:'done', assignee:'Lan N.', date:'06 Jun', priority:'normal', notes:'Floor wet set, plastic cover applied. All clear.' },
  { id:8, job:'Pack up floor wet', icon:'ti-stack-2', status:'done', assignee:'Hùng V.', date:'09 Jun', priority:'low', notes:'Floor wet layer removed. Ready for clean room.' },
];

const PRIO_CLS = { normal:'prio-normal', high:'prio-high', urgent:'prio-urgent', low:'prio-low' };
const PRIO_LABEL = { normal:'Normal', high:'High', urgent:'Urgent', low:'Low' };

let selectedTask = null;

function renderCard(t) {
  const sel = selectedTask && selectedTask.id === t.id ? ' selected' : '';
  return `<div class="task-card${sel}" onclick="selectTask(${t.id})">
    <div class="tc-job"><i class="ti ${t.icon}" aria-hidden="true"></i>${t.job}</div>
    <div class="tc-meta">
      <span class="tc-assign">${t.assignee}</span>
      <span class="tc-prio ${PRIO_CLS[t.priority]}">${PRIO_LABEL[t.priority]}</span>
      <span class="tc-date"><i class="ti ti-calendar" aria-hidden="true"></i>${t.date}</span>
    </div>
  </div>`;
}

function renderBoard() {
  const cols = { todo:[], inprog:[], review:[], done:[] };
  TASKS.forEach(t => cols[t.status].push(t));
  document.getElementById('col-todo').innerHTML = cols.todo.map(renderCard).join('');
  document.getElementById('col-inprog').innerHTML = cols.inprog.map(renderCard).join('');
  document.getElementById('col-review').innerHTML = cols.review.map(renderCard).join('');
  document.getElementById('col-done').innerHTML = cols.done.map(renderCard).join('');
  document.getElementById('cnt-todo').textContent = cols.todo.length;
  document.getElementById('cnt-inprog').textContent = cols.inprog.length;
  document.getElementById('cnt-review').textContent = cols.review.length;
  document.getElementById('cnt-done').textContent = cols.done.length;
  const done = cols.done.length;
  const total = TASKS.length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = done + ' / ' + total;
}

function selectTask(id) {
  const t = TASKS.find(x => x.id === id);
  if (selectedTask && selectedTask.id === id) {
    selectedTask = null;
    document.getElementById('detail-panel').className = 'detail-panel';
    renderBoard();
    return;
  }
  selectedTask = t;
  renderBoard();
  const STATUS_LABEL = { todo:'To do', inprog:'In progress', review:'Review', done:'Done' };
  const dp = document.getElementById('detail-panel');
  dp.className = 'detail-panel show';
  dp.innerHTML = `<div class="dp-header">
    <div class="dp-title"><i class="ti ${t.icon}" aria-hidden="true"></i>${t.job}</div>
    <button class="dp-close" onclick="selectTask(${t.id})"><i class="ti ti-x" style="font-size:13px;" aria-hidden="true"></i></button>
  </div>
  <div class="dp-grid">
    <div class="dp-field"><label>Status</label><span><span class="pill pill-${t.status==='done'?'green':t.status==='inprog'?'blue':t.status==='review'?'amber':'gray'}">${STATUS_LABEL[t.status]}</span></span></div>
    <div class="dp-field"><label>Assigned</label><span>${t.assignee}</span></div>
    <div class="dp-field"><label>Date</label><span>${t.date} Jun 2026</span></div>
    <div class="dp-field"><label>Priority</label><span><span class="tc-prio ${PRIO_CLS[t.priority]}">${PRIO_LABEL[t.priority]}</span></span></div>
    <div class="dp-field"><label>Room</label><span>33 · Plant M2</span></div>
    <div class="dp-field"><label>Cycle</label><span>M2-Cycle-1</span></div>
  </div>
  <div class="dp-notes">${t.notes}</div>
  <div style="display:flex;gap:8px;margin-top:10px;">
    ${t.status!=='done'?`<button class="btn-sm btn-primary" onclick="moveNext(${t.id})"><i class="ti ti-arrow-right" style="font-size:13px;" aria-hidden="true"></i>Move forward ↗</button>`:''}
    <button class="btn-sm btn-ghost" onclick="sendPrompt('Chỉnh sửa task ${t.job} phòng 33 Plant M2 Cycle 1')"><i class="ti ti-edit" style="font-size:13px;" aria-hidden="true"></i>Edit ↗</button>
  </div>`;
}

function moveNext(id) {
  const t = TASKS.find(x => x.id === id);
  const flow = ['todo','inprog','review','done'];
  const idx = flow.indexOf(t.status);
  if (idx < flow.length - 1) { t.status = flow[idx+1]; selectedTask = t; }
  renderBoard();
  selectTask(id);
}

renderBoard();
</script>
